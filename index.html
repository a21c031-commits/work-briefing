<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Briefing · 딩톡 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: #e4e2da;
    --text: #1a1917;
    --muted: #7a7770;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --accent-muted: #6b9e7a;
    --tag-bg: #f0ede6;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo-main {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .api-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .api-row label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  .api-input {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus {
    border-color: var(--accent-muted);
  }

  .api-status {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ddd;
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .api-status.ok { background: #4caf50; }
  .api-status.err { background: #e57373; }

  main {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }

  .input-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .lang-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--tag-bg);
    color: var(--muted);
    letter-spacing: 0.3px;
  }

  .lang-badge.detected {
    background: var(--accent-light);
    color: var(--accent);
  }

  textarea {
    width: 100%;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    line-height: 1.7;
    border: none;
    outline: none;
    resize: vertical;
    min-height: 160px;
    background: transparent;
    color: var(--text);
    placeholder-color: var(--muted);
  }

  textarea::placeholder {
    color: var(--muted);
    font-size: 13px;
  }

  .options-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .option-label {
    font-size: 12px;
    color: var(--muted);
  }

  .tone-btns {
    display: flex;
    gap: 6px;
  }

  .tone-btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .tone-btn:hover { border-color: var(--accent-muted); color: var(--accent); }
  .tone-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  .analyze-btn {
    margin-left: auto;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 9px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .analyze-btn:hover { opacity: 0.88; }
  .analyze-btn:active { transform: scale(0.98); }
  .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 24px;
  }

  @media (max-width: 600px) {
    .results-grid { grid-template-columns: 1fr; }
    header { padding: 14px 16px; flex-direction: column; align-items: flex-start; gap: 10px; }
    .api-input { width: 180px; }
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  .result-card.show {
    opacity: 1;
    transform: translateY(0);
  }

  .result-card.full-width {
    grid-column: 1 / -1;
  }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .result-type {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .type-icon {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
  }

  .icon-summary { background: #e8f0ea; }
  .icon-translate { background: #e8eef8; }
  .icon-report { background: #fdf0e8; }
  .icon-oneline { background: #f0e8f8; }

  .result-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.2px;
  }

  .result-subtitle {
    font-size: 11px;
    color: var(--muted);
  }

  .copy-btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .copy-btn:hover { border-color: var(--accent-muted); color: var(--accent); background: var(--accent-light); }
  .copy-btn.copied { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .result-body {
    font-size: 13px;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 40px;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: 8px;
    flex: 1;
  }

  .result-body.placeholder {
    color: var(--muted);
    font-style: italic;
  }

  .loading-bar {
    height: 2px;
    background: linear-gradient(90deg, var(--accent-light), var(--accent), var(--accent-light));
    background-size: 200% 100%;
    border-radius: 2px;
    animation: shimmer 1.2s infinite;
    display: none;
    margin: 4px 0;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .error-msg {
    font-size: 12px;
    color: #c0392b;
    padding: 10px 14px;
    background: #fdf0ef;
    border-radius: 8px;
    border: 1px solid #f5c6c2;
    margin-top: 12px;
    display: none;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 6px 0;
  }

  .action-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 4px;
  }

  .action-tag {
    font-size: 11px;
    padding: 3px 9px;
    background: var(--tag-bg);
    border-radius: 20px;
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-main">Work Briefing</span>
    <span class="logo-sub">딩톡 분석기</span>
  </div>
  <div class="api-row">
    <label>API KEY</label>
    <input class="api-input" type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off">
    <div class="api-status" id="apiStatus"></div>
  </div>
</header>

<main>
  <div class="input-card">
    <div class="input-header">
      <div class="section-label">대화 내용 붙여넣기</div>
      <span class="lang-badge" id="langBadge">언어 자동 감지</span>
    </div>
    <textarea id="inputText"
      placeholder="딩톡, 위챗, 이메일 등 업무 대화 내용을 붙여넣으세요.&#10;한국어 / 中文 모두 가능합니다."></textarea>

    <div class="options-row">
      <span class="option-label">보고 톤</span>
      <div class="tone-btns">
        <button class="tone-btn active" data-tone="formal">공식</button>
        <button class="tone-btn" data-tone="friendly">친근</button>
        <button class="tone-btn" data-tone="urgent">긴급</button>
      </div>
      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">
        <div class="spinner" id="spinner"></div>
        분석하기
      </button>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="loading-bar" id="loadingBar"></div>

  <div class="results-grid" id="resultsGrid">
    <div class="result-card" id="card-summary">
      <div class="result-header">
        <div class="result-type">
          <div class="type-icon icon-summary">📋</div>
          <div>
            <div class="result-title">상황 요약</div>
            <div class="result-subtitle">핵심 파악 3줄</div>
          </div>
        </div>
        <button class="copy-btn" onclick="copyResult('summary')">복사</button>
      </div>
      <div class="result-body placeholder" id="body-summary">분석 결과가 여기에 표시됩니다</div>
    </div>

    <div class="result-card" id="card-translate">
      <div class="result-header">
        <div class="result-type">
          <div class="type-icon icon-translate">🔄</div>
          <div>
            <div class="result-title">번역본</div>
            <div class="result-subtitle" id="translate-subtitle">한 ↔ 중 번역</div>
          </div>
        </div>
        <button class="copy-btn" onclick="copyResult('translate')">복사</button>
      </div>
      <div class="result-body placeholder" id="body-translate">분석 결과가 여기에 표시됩니다</div>
    </div>

    <div class="result-card" id="card-report">
      <div class="result-header">
        <div class="result-type">
          <div class="type-icon icon-report">📨</div>
          <div>
            <div class="result-title">딩톡 보고 메시지</div>
            <div class="result-subtitle">상사용 중문 보고</div>
          </div>
        </div>
        <button class="copy-btn" onclick="copyResult('report')">복사</button>
      </div>
      <div class="result-body placeholder" id="body-report">분석 결과가 여기에 표시됩니다</div>
    </div>

    <div class="result-card" id="card-action">
      <div class="result-header">
        <div class="result-type">
          <div class="type-icon icon-oneline">⚡</div>
          <div>
            <div class="result-title">액션 아이템</div>
            <div class="result-subtitle">우선순위 할 일</div>
          </div>
        </div>
        <button class="copy-btn" onclick="copyResult('action')">복사</button>
      </div>
      <div class="result-body placeholder" id="body-action">분석 결과가 여기에 표시됩니다</div>
    </div>

    <div class="result-card full-width" id="card-oneline">
      <div class="result-header">
        <div class="result-type">
          <div class="type-icon icon-oneline">📢</div>
          <div>
            <div class="result-title">유관부서 공유용 한 줄 요약</div>
            <div class="result-subtitle">한국어 · 내부 공유용</div>
          </div>
        </div>
        <button class="copy-btn" onclick="copyResult('oneline')">복사</button>
      </div>
      <div class="result-body placeholder" id="body-oneline">분석 결과가 여기에 표시됩니다</div>
    </div>
  </div>
</main>

<script>
let selectedTone = 'formal';
let results = { summary: '', translate: '', report: '', action: '', oneline: '' };

document.querySelectorAll('.tone-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedTone = btn.dataset.tone;
  });
});

const textarea = document.getElementById('inputText');
textarea.addEventListener('input', detectLang);

function detectLang() {
  const text = textarea.value;
  const badge = document.getElementById('langBadge');
  const chinese = (text.match(/[\u4e00-\u9fff]/g) || []).length;
  const korean = (text.match(/[\uac00-\ud7af]/g) || []).length;
  if (chinese > korean && chinese > 2) {
    badge.textContent = '중문 감지됨 · 中文';
    badge.className = 'lang-badge detected';
    document.getElementById('translate-subtitle').textContent = '중→한 번역';
  } else if (korean > chinese && korean > 2) {
    badge.textContent = '한국어 감지됨';
    badge.className = 'lang-badge detected';
    document.getElementById('translate-subtitle').textContent = '한→중 번역';
  } else {
    badge.textContent = '언어 자동 감지';
    badge.className = 'lang-badge';
  }
}

const apiKeyInput = document.getElementById('apiKey');
const savedKey = sessionStorage.getItem('wb_api_key');
if (savedKey) apiKeyInput.value = savedKey;

apiKeyInput.addEventListener('input', () => {
  sessionStorage.setItem('wb_api_key', apiKeyInput.value);
  document.getElementById('apiStatus').className = 'api-status';
});

async function analyze() {
  const apiKey = apiKeyInput.value.trim();
  const inputText = textarea.value.trim();

  if (!apiKey) {
    showError('API 키를 입력해주세요.');
    return;
  }
  if (!inputText) {
    showError('분석할 대화 내용을 붙여넣어주세요.');
    return;
  }

  const toneMap = { formal: '공식적이고 정중한', friendly: '친근하고 자연스러운', urgent: '긴급하고 간결한' };
  const toneKor = toneMap[selectedTone];

  setLoading(true);
  clearResults();

  const systemPrompt = `You are a bilingual Korean-Chinese business analyst assistant for a Korean e-commerce professional working in payment partnerships. 
The user will paste business chat messages (DingTalk/WeChat/email) in Korean or Chinese.
You must respond ONLY with a valid JSON object — no markdown, no preamble.`;

  const userPrompt = `Analyze this business conversation and return ONLY a JSON object with these exact keys:

{
  "detected_lang": "ko" or "zh",
  "summary": "3-line bullet point summary of the situation (use the same language as input)",
  "translate": "Full translation to the OTHER language (Korean→Chinese or Chinese→Korean). Natural, professional tone.",
  "report": "A DingTalk-style report message in Chinese (中文) for reporting to a superior. Tone: ${toneKor}. Format it like a real DingTalk message with appropriate greeting.",
  "action": "Priority action items as numbered list in Korean. 3-5 items max.",
  "oneline": "One concise sentence summary in Korean for sharing with internal teams (유관부서 공유용)"
}

Business conversation to analyze:
---
${inputText}
---`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const raw = data.content[0].text.trim();

    let parsed;
    try {
      const cleaned = raw.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(cleaned);
    } catch {
      throw new Error('응답 파싱 오류. 다시 시도해주세요.');
    }

    results.summary = parsed.summary || '';
    results.translate = parsed.translate || '';
    results.report = parsed.report || '';
    results.action = parsed.action || '';
    results.oneline = parsed.oneline || '';

    ['summary', 'translate', 'report', 'action', 'oneline'].forEach((key, i) => {
      setTimeout(() => {
        const el = document.getElementById(`body-${key}`);
        const card = document.getElementById(`card-${key}`);
        el.textContent = results[key];
        el.classList.remove('placeholder');
        card.classList.add('show');
      }, i * 80);
    });

    document.getElementById('apiStatus').className = 'api-status ok';

  } catch (e) {
    document.getElementById('apiStatus').className = 'api-status err';
    showError('오류: ' + e.message);
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  const btn = document.getElementById('analyzeBtn');
  const spinner = document.getElementById('spinner');
  const bar = document.getElementById('loadingBar');
  btn.disabled = on;
  spinner.style.display = on ? 'block' : 'none';
  bar.style.display = on ? 'block' : 'none';
  hideError();
}

function clearResults() {
  ['summary', 'translate', 'report', 'action', 'oneline'].forEach(key => {
    const el = document.getElementById(`body-${key}`);
    const card = document.getElementById(`card-${key}`);
    el.textContent = '분석 중...';
    el.classList.add('placeholder');
    card.classList.remove('show');
  });
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

async function copyResult(key) {
  const text = results[key];
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    const btns = document.querySelectorAll(`#card-${key} .copy-btn`);
    btns.forEach(btn => {
      btn.textContent = '복사됨 ✓';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '복사';
        btn.classList.remove('copied');
      }, 1800);
    });
  } catch { }
}

document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyze();
});
</script>
</body>
</html>
