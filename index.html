<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Briefing - 딩톡 분석기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', 'Noto Sans SC', sans-serif;
            background-color: #f8f9fa;
            color: #212529;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 32px;
            color: #212529;
        }

        .api-key-section {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .api-key-section label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #495057;
        }

        .api-key-section input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .api-key-section input:focus {
            outline: none;
            border-color: #4dabf7;
            box-shadow: 0 0 0 3px rgba(77, 171, 247, 0.15);
        }

        .input-section {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .input-section label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #495057;
        }

        .input-section textarea,
        .input-section input {
            width: 100%;
            padding: 16px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-section textarea {
            min-height: 200px;
            resize: vertical;
        }

        .input-section textarea:focus,
        .input-section input:focus {
            outline: none;
            border-color: #4dabf7;
            box-shadow: 0 0 0 3px rgba(77, 171, 247, 0.15);
        }

        .button-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .analyze-btn {
            background: #228be6;
            color: #fff;
            border: none;
            padding: 14px 48px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .analyze-btn:hover {
            background: #1c7ed6;
        }

        .analyze-btn:active {
            transform: scale(0.98);
        }

        .analyze-btn:disabled {
            background: #adb5bd;
            cursor: not-allowed;
        }

        .results-section {
            display: none;
        }

        .results-section.show {
            display: block;
        }

        .result-card {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .result-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .result-card-title {
            font-size: 16px;
            font-weight: 700;
            color: #212529;
        }

        .copy-btn {
            background: #f1f3f5;
            color: #495057;
            border: 1px solid #dee2e6;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #e9ecef;
        }

        .copy-btn.copied {
            background: #d3f9d8;
            color: #2b8a3e;
            border-color: #8ce99a;
        }

        .result-card-content {
            font-size: 15px;
            color: #495057;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .history-section {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .history-section h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #212529;
        }

        .history-list {
            display: grid;
            gap: 14px;
        }

        .history-card {
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 18px;
            background: #f8f9fa;
        }

        .history-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .history-card-title {
            font-size: 14px;
            font-weight: 700;
            color: #212529;
        }

        .history-card-subtitle {
            font-size: 13px;
            color: #6c757d;
        }

        .history-card-content {
            font-size: 14px;
            color: #495057;
            white-space: pre-wrap;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.show {
            display: block;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e9ecef;
            border-top-color: #228be6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            display: none;
            background: #fff5f5;
            border: 1px solid #ffc9c9;
            border-radius: 8px;
            padding: 16px;
            color: #c92a2a;
            margin-bottom: 20px;
        }

        .error-message.show {
            display: block;
        }

        .language-badge {
            display: inline-block;
            background: #e7f5ff;
            color: #1971c2;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 4px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Work Briefing</h1>

        <div class="api-key-section">
            <label for="supabaseUrl">Supabase URL</label>
            <input type="text" id="supabaseUrl" value="https://xenuivpmvibjulqwkmbo.supabase.co" />
            <label for="supabaseKey">Supabase anon/public key</label>
            <input type="password" id="supabaseKey" value="sb_publishable_1AkyCRBTKIe4FJ6EIAZWaw_guTvV8ft" />
        </div>

        <div class="api-key-section">
            <label for="apiKey">Anthropic API Key</label>
            <input type="password" id="apiKey" placeholder="sk-ant-..." />
        </div>

        <div class="input-section">
            <label for="inputText">딩톡 대화 또는 상황 설명을 붙여넣으세요</label>
            <textarea id="inputText" placeholder="예: 오늘 미팅에서 프로젝트 진행 상황에 대해 논의했고, 다음 주까지 디자인稿을 제출해야 한다는 합의가 있었습니다..."></textarea>
            <label for="category" style="margin-top:16px; display:block; font-size:14px; font-weight:600; color:#495057;">카테고리</label>
            <input type="text" id="category" placeholder="예: 고객지원 / 기획 / 회의" />
        </div>

        <div class="button-section">
            <button class="analyze-btn" id="analyzeBtn">분석하기</button>
        </div>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>분석 중...</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="results-section" id="results">
            <div class="result-card">
                <div class="result-card-header">
                    <span class="result-card-title">상황 요약 <span class="language-badge" id="summaryLang"></span></span>
                    <button class="copy-btn" onclick="copyToClipboard('summaryContent', this)">복사</button>
                </div>
                <div class="result-card-content" id="summaryContent"></div>
            </div>

            <div class="result-card">
                <div class="result-card-header">
                    <span class="result-card-title">번역본 <span class="language-badge" id="translateLang"></span></span>
                    <button class="copy-btn" onclick="copyToClipboard('translateContent', this)">복사</button>
                </div>
                <div class="result-card-content" id="translateContent"></div>
            </div>

            <div class="result-card">
                <div class="result-card-header">
                    <span class="result-card-title">광명老师 보고용 메시지 (중국어)</span>
                    <button class="copy-btn" onclick="copyToClipboard('guangmingContent', this)">복사</button>
                </div>
                <div class="result-card-content" id="guangmingContent"></div>
            </div>

            <div class="result-card">
                <div class="result-card-header">
                    <span class="result-card-title">유관부서 공유용 한 줄 요약 (한국어)</span>
                    <button class="copy-btn" onclick="copyToClipboard('deptContent', this)">복사</button>
                </div>
                <div class="result-card-content" id="deptContent"></div>
            </div>
        </div>

        <div class="history-section">
            <h2>과거 분석 기록</h2>
            <div class="history-list" id="historyList">
                <p>Supabase URL과 Key를 입력하면 과거 분석 기록이 표시됩니다.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const errorMessage = document.getElementById('errorMessage');
        const historyList = document.getElementById('historyList');

        document.addEventListener('DOMContentLoaded', async () => {
            updateHistoryMessage('Supabase URL과 Key를 입력하면 과거 분석 기록이 표시됩니다.');
            try {
                await loadHistory();
            } catch (e) {
                // Ignore errors on load
            }
        });

        analyzeBtn.addEventListener('click', async () => {
            const supabaseUrl = document.getElementById('supabaseUrl').value.trim();
            const supabaseKey = document.getElementById('supabaseKey').value.trim();
            const apiKey = document.getElementById('apiKey').value.trim();
            const inputText = document.getElementById('inputText').value.trim();
            const category = document.getElementById('category').value.trim() || '일반';

            if (!supabaseUrl || !supabaseKey) {
                showError('Supabase URL과 Key를 입력해주세요.');
                return;
            }

            if (!apiKey) {
                showError('API Key를 입력해주세요.');
                return;
            }

            if (!inputText) {
                showError('분석할 내용을 입력해주세요.');
                return;
            }

            hideError();
            showLoading(true);
            analyzeBtn.disabled = true;

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 4000,
                        messages: [{
                            role: 'user',
                            content: `당신은 딩톡 대화 분석기입니다. 다음 대화를 분석하고 4가지 결과를 생성해주세요.

입력 텍스트:
${inputText}

다음 JSON 형식으로 결과를 생성해주세요. 각 필드의 내용을 채워주세요:

{
  "detectedLanguage": "ko" 또는 "zh",
  "summary": "입력 언어로 된 상황 요약",
  "translation": "번역본 (입력 언어가 한국어면 중국어로, 중국어면 한국어로)",
  "guangmingMessage": "광명老师에게 보고할 메시지 (중국어, 딩톡 톤 - 친근하고 자연스러운 대화체)",
  "deptSummary": "유관부서와 공유할 한 줄 요약 (한국어)"
}

주의사항:
- detectedLanguage: 입력이 한국어면 "ko", 중국어면 "zh"로 설정
- summary: 입력된 텍스트의 핵심 내용을 입력 언어로 요약
- translation: 한국어→중국어 또는 중국어→한국어로 번역
- guangmingMessage: 중국어로 작성하되, 딩톡에서老师에게 보내는 것처럼 자연스럽고 친근한 톤으로
- deptSummary: 한국어로 된 간결한 한 줄 요약

JSON만 출력하고 다른 설명은 하지 마세요.`
                        }]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'API 호출 실패');
                }

                const data = await response.json();
                const content = data.content[0].text;
                const jsonMatch = content.match(/\{[\s\S]*\}/);
                if (!jsonMatch) {
                    throw new Error('응답 형식이 올바르지 않습니다.');
                }

                const result = JSON.parse(jsonMatch[0]);
                displayResults(result);
                await saveResultToSupabase(result, category);
                await loadHistory();

            } catch (error) {
                showError('오류가 발생했습니다: ' + error.message);
            } finally {
                showLoading(false);
                analyzeBtn.disabled = false;
            }
        });

        function getSupabaseClient() {
            const supabaseUrl = document.getElementById('supabaseUrl').value.trim();
            const supabaseKey = document.getElementById('supabaseKey').value.trim();
            if (!supabaseUrl || !supabaseKey) {
                throw new Error('Supabase URL과 Key를 입력해주세요.');
            }
            return supabase.createClient(supabaseUrl, supabaseKey);
        }

        async function saveResultToSupabase(result, category) {
            const client = getSupabaseClient();
            const { error } = await client.from('briefings').insert([{
                input_language: result.detectedLanguage,
                summary: result.summary,
                translation: result.translation,
                manager_report: result.guangmingMessage,
                department_summary: result.deptSummary,
                category
            }]);

            if (error) {
                throw new Error(error.message);
            }
        }

        async function loadHistory() {
            const supabaseUrl = document.getElementById('supabaseUrl').value.trim();
            const supabaseKey = document.getElementById('supabaseKey').value.trim();
            if (!supabaseUrl || !supabaseKey) {
                updateHistoryMessage('Supabase URL과 Key를 입력하면 과거 분석 기록이 표시됩니다.');
                return;
            }
            try {
                const client = getSupabaseClient();
                const { data, error } = await client
                    .from('briefings')
                    .select('id, created_at, input_language, summary, translation, manager_report, department_summary, category')
                    .order('created_at', { ascending: false })
                    .limit(20);

                if (error) {
                    throw error;
                }

                renderHistory(data || []);
            } catch (error) {
                updateHistoryMessage('기록을 불러올 수 없습니다. Supabase 설정을 확인해주세요.');
            }
        }

        function renderHistory(entries) {
            if (!entries.length) {
                updateHistoryMessage('저장된 기록이 없습니다.');
                return;
            }

            historyList.innerHTML = '';
            entries.forEach(item => {
                const card = document.createElement('div');
                card.className = 'history-card';
                card.innerHTML = `
                    <div class="history-card-header">
                        <div>
                            <div class="history-card-title">${item.category || '일반'} · ${item.input_language === 'ko' ? '한국어' : '중국어'}</div>
                            <div class="history-card-subtitle">${new Date(item.created_at).toLocaleString('ko-KR')}</div>
                        </div>
                    </div>
                    <div class="history-card-content">
                        <strong>요약:</strong> ${item.summary}<br />
                        <strong>공유용 요약:</strong> ${item.department_summary}
                    </div>
                `;
                historyList.appendChild(card);
            });
        }

        function updateHistoryMessage(message) {
            historyList.innerHTML = `<p style="color:#6c757d; font-size:14px;">${message}</p>`;
        }

        function displayResults(result) {
            document.getElementById('summaryContent').textContent = result.summary;
            document.getElementById('summaryLang').textContent = result.detectedLanguage === 'ko' ? '한국어' : '중국어';
            document.getElementById('translateContent').textContent = result.translation;
            document.getElementById('translateLang').textContent = result.detectedLanguage === 'ko' ? '중국어' : '한국어';
            document.getElementById('guangmingContent').textContent = result.guangmingMessage;
            document.getElementById('deptContent').textContent = result.deptSummary;
            results.classList.add('show');
        }

        function copyToClipboard(elementId, button) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(() => {
                button.textContent = '복사됨';
                button.classList.add('copied');
                setTimeout(() => {
                    button.textContent = '복사';
                    button.classList.remove('copied');
                }, 2000);
            });
        }

        function showLoading(show) {
            loading.classList.toggle('show', show);
            results.classList.remove('show');
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            results.classList.remove('show');
        }

        function hideError() {
            errorMessage.classList.remove('show');
        }
    </script>
</body>
</html>
